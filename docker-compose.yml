services:
  finance-tracker:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    container_name: finance-tracker
    ports:
      - "5757:5757"
    environment:
      FINANCE_TRACKER_DATA_DIR: /data
    volumes:
      - finance_tracker_data:/data
    restart: unless-stopped

volumes:
  finance_tracker_data:
