<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Tracker — Sign In</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<style>
  :root {
    --bg:  #0d1117;
    --sur: #161b22;
    --bdr: #30363d;
    --tx:  #e6edf3;
    --tx2: #8b949e;
    --ac:  #4f7ef8;
    --ac-h:#3a68e0;
    --er:  #f85149;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--tx);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--sur);
    border: 1px solid var(--bdr);
    border-radius: 12px;
    padding: 40px 36px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-logo i {
    font-size: 2.4rem;
    color: var(--ac);
  }
  .login-logo h1 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-top: 8px;
    color: var(--tx);
  }
  .login-logo p {
    font-size: .85rem;
    color: var(--tx2);
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--tx2);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  input[type=text], input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--bdr);
    border-radius: 6px;
    color: var(--tx);
    font-size: .95rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus, input[type=password]:focus {
    border-color: var(--ac);
  }
  .field { margin-bottom: 18px; }
  .btn-login {
    width: 100%;
    background: var(--ac);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: .95rem;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: background .15s;
    margin-top: 4px;
  }
  .btn-login:hover:not(:disabled) { background: var(--ac-h); }
  .btn-login:disabled { opacity: .6; cursor: not-allowed; }
  .error-msg {
    background: rgba(248,81,73,.12);
    border: 1px solid rgba(248,81,73,.35);
    border-radius: 6px;
    color: var(--er);
    font-size: .875rem;
    padding: 9px 12px;
    margin-bottom: 18px;
    display: none;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <i class="bi bi-bar-chart-fill"></i>
    <h1>Finance Tracker</h1>
    <p>Sign in to your account</p>
  </div>

  <div class="error-msg" id="err-msg"></div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             autocapitalize="none" spellcheck="false" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn-login" id="submit-btn" type="submit">Sign In</button>
  </form>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');
  const errEl    = document.getElementById('err-msg');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const resp = await fetch('/api/login', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({username, password}),
    });
    if (resp.ok) {
      // Cookie is set by server; redirect to app
      window.location.href = '/';
    } else {
      const data = await resp.json().catch(() => ({}));
      errEl.textContent    = data.error || 'Sign-in failed. Please try again.';
      errEl.style.display  = 'block';
      btn.disabled         = false;
      btn.textContent      = 'Sign In';
      document.getElementById('password').focus();
    }
  } catch {
    errEl.textContent   = 'Cannot reach the server. Please try again.';
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.textContent     = 'Sign In';
  }
}
</script>
</body>
</html>
