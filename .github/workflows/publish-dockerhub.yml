name: Build and Push Docker image

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read app version
        id: version
        run: echo "APP_VERSION=$(tr -d '\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Determine branch tag
        id: branch-tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "TAG=latest" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.version.outputs.APP_VERSION }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ steps.branch-tag.outputs.TAG }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.APP_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
